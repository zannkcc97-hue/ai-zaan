<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZanxAI — Asisten Cerdas</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    :root {
      --bg: #07060f;
      --surface: #0f0d1a;
      --surface2: #16132a;
      --border: rgba(139,92,246,0.15);
      --accent: #a78bfa;
      --accent2: #38bdf8;
      --green: #4ade80;
      --text: #ede9fe;
      --muted: #6b6490;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(139,92,246,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 90% 90%, rgba(56,189,248,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.3); border-radius: 99px; }

    /* HEADER */
    .header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.4rem;
      border-bottom: 1px solid var(--border);
      background: rgba(7,6,15,0.85);
      backdrop-filter: blur(24px);
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-logo {
      position: relative;
      width: 36px; height: 36px;
    }
    .brand-logo-ring {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      border: 1.5px solid rgba(167,139,250,0.5);
      animation: spinRing 6s linear infinite;
    }
    @keyframes spinRing {
      to { transform: rotate(360deg); }
    }
    .brand-logo-inner {
      position: absolute;
      inset: 4px;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }
    .brand-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.05rem;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, #c4b5fd, #818cf8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .brand-sub {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(74,222,128,0.08);
      border: 1px solid rgba(74,222,128,0.2);
      padding: 4px 11px;
      border-radius: 99px;
      font-size: 0.68rem;
      color: var(--green);
      letter-spacing: 0.3px;
    }
    .status-dot {
      width: 5px; height: 5px;
      background: var(--green);
      border-radius: 50%;
      animation: blink 2s infinite;
    }
    @keyframes blink {
      0%,100%{opacity:1} 50%{opacity:0.2}
    }

    .clear-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 11px;
      border-radius: 8px;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .clear-btn:hover { border-color: rgba(139,92,246,0.4); color: var(--accent); }

    /* CHAT */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      position: relative;
      z-index: 1;
      scroll-behavior: smooth;
    }

    /* WELCOME */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      flex: 1;
      text-align: center;
      padding: 2rem 1rem;
      animation: fadeUp 0.5s ease;
    }

    .welcome-orb {
      position: relative;
      width: 72px; height: 72px;
      margin-bottom: 0.3rem;
    }
    .welcome-orb-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid rgba(167,139,250,0.4);
      animation: spinRing 5s linear infinite;
    }
    .welcome-orb-ring2 {
      position: absolute;
      inset: 6px;
      border-radius: 50%;
      border: 1px dashed rgba(56,189,248,0.3);
      animation: spinRing 8s linear infinite reverse;
    }
    .welcome-orb-core {
      position: absolute;
      inset: 12px;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 24px rgba(124,58,237,0.5);
    }

    .welcome h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.7rem;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1.2;
    }
    .welcome h2 span {
      background: linear-gradient(90deg, #c4b5fd, #818cf8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .welcome p {
      color: var(--muted);
      font-size: 0.85rem;
      max-width: 300px;
      line-height: 1.65;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      justify-content: center;
      max-width: 460px;
      margin-top: 0.3rem;
    }
    .chip {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 7px 13px;
      border-radius: 99px;
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .chip:hover {
      border-color: rgba(167,139,250,0.4);
      color: var(--accent);
      background: rgba(139,92,246,0.06);
    }

    /* MESSAGES */
    .message {
      display: flex;
      gap: 9px;
      animation: fadeUp 0.3s ease;
      max-width: 860px;
      width: 100%;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(10px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .message.user { flex-direction: row-reverse; margin-left: auto; }
    .message.ai   { margin-right: auto; }

    .av {
      width: 28px; height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .av.ai {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      box-shadow: 0 0 12px rgba(124,58,237,0.4);
    }
    .av.user {
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 15px;
      font-size: 0.875rem;
      line-height: 1.7;
      max-width: calc(100% - 40px);
      word-break: break-word;
    }
    .message.user .bubble {
      background: var(--surface2);
      border: 1px solid rgba(139,92,246,0.2);
      border-bottom-right-radius: 4px;
    }
    .message.ai .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: #ddd6fe;
    }

    /* TYPING */
    .typing-dots { display:flex; gap:5px; padding:4px 2px; align-items:center; }
    .typing-dots span {
      width:7px; height:7px;
      background: var(--accent);
      border-radius:50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2){ animation-delay:.15s; }
    .typing-dots span:nth-child(3){ animation-delay:.3s; }
    @keyframes bounce {
      0%,60%,100%{ transform:translateY(0); opacity:0.3; }
      30%{ transform:translateY(-5px); opacity:1; }
    }

    /* INPUT */
    .input-area {
      position: relative;
      z-index: 10;
      padding: 0.9rem 1.4rem 1.1rem;
      border-top: 1px solid var(--border);
      background: rgba(7,6,15,0.9);
      backdrop-filter: blur(24px);
      flex-shrink: 0;
    }
    .input-box {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 9px 9px 9px 15px;
      transition: border-color 0.2s;
    }
    .input-box:focus-within { border-color: rgba(139,92,246,0.45); }

    textarea {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      resize: none;
      outline: none;
      max-height: 130px;
      min-height: 22px;
      line-height: 1.55;
    }
    textarea::placeholder { color: var(--muted); }

    .send-btn {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border: none;
      border-radius: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      color: white;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 16px rgba(124,58,237,0.35);
      transition: all 0.15s;
      width: auto;
      flex-shrink: 0;
    }
    .send-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,58,237,0.5); }
    .send-btn:active { transform: translateY(0); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .input-hint {
      text-align: center;
      font-size: 0.62rem;
      color: rgba(107,100,144,0.6);
      margin-top: 7px;
      letter-spacing: 0.3px;
    }

    /* FORMATTING */
    .bubble pre {
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(139,92,246,0.2);
      border-radius: 9px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 8px 0;
      font-size: 0.8rem;
      font-family: 'Courier New', monospace;
    }
    .bubble code {
      font-family: 'Courier New', monospace;
      font-size: 0.83em;
      color: #c4b5fd;
      background: rgba(139,92,246,0.1);
      padding: 1px 5px;
      border-radius: 4px;
    }
    .bubble pre code { background: none; padding: 0; }
    .bubble strong { color: #fff; }
    .bubble em { color: #a5b4fc; }
    .bubble ul, .bubble ol { padding-left: 1.3rem; }
    .bubble li { margin: 3px 0; }
    .bubble a { color: var(--accent2); text-decoration: underline; }

    @media(max-width:500px) {
      .header { padding: 0.75rem 1rem; }
      .chat-area { padding: 1rem; }
      .input-area { padding: 0.75rem 1rem 0.9rem; }
      .welcome h2 { font-size: 1.4rem; }
      .brand-sub { display: none; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="brand">
    <div class="brand-logo">
      <div class="brand-logo-ring"></div>
      <div class="brand-logo-inner">⚡</div>
    </div>
    <div class="brand-text">
      <div class="brand-name">ZanxAI</div>
      <div class="brand-sub">Asisten Cerdas</div>
    </div>
  </div>
  <div class="header-right">
    <div class="status-pill"><div class="status-dot"></div>Online</div>
    <button class="clear-btn" onclick="clearChat()">Hapus</button>
  </div>
</div>

<!-- CHAT AREA -->
<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcomeScreen">
    <div class="welcome-orb">
      <div class="welcome-orb-ring"></div>
      <div class="welcome-orb-ring2"></div>
      <div class="welcome-orb-core">⚡</div>
    </div>
    <h2>Halo! Saya <span>ZanxAI</span></h2>
    <p>Asisten AI kamu yang siap bantu kapan saja. Tanya apa aja!</p>
    <div class="suggestions">
      <div class="chip" onclick="sendSuggestion('Buatkan contoh kode Python sederhana')">💻 Kode Python</div>
      <div class="chip" onclick="sendSuggestion('Jelaskan cara kerja AI dengan bahasa sederhana')">🧠 Cara kerja AI</div>
      <div class="chip" onclick="sendSuggestion('Bantu saya buat caption Instagram yang keren')">✍️ Caption IG</div>
      <div class="chip" onclick="sendSuggestion('Rekomendasikan anime yang bagus')">🎌 Anime</div>
      <div class="chip" onclick="sendSuggestion('Apa resep masakan yang mudah dibuat?')">🍳 Resep masakan</div>
      <div class="chip" onclick="sendSuggestion('Siapa kamu?')">🤖 Siapa kamu?</div>
    </div>
  </div>
</div>

<!-- INPUT -->
<div class="input-area">
  <div class="input-box">
    <textarea id="userInput" placeholder="Tanya ZanxAI..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      Kirim
    </button>
  </div>
  <div class="input-hint">Enter untuk kirim &nbsp;·&nbsp; Shift+Enter baris baru</div>
</div>

<script>
  let messages = [];
  const chatArea = document.getElementById("chatArea");
  const userInput = document.getElementById("userInput");
  const sendBtn = document.getElementById("sendBtn");

  userInput.addEventListener("input", () => {
    userInput.style.height = "auto";
    userInput.style.height = Math.min(userInput.scrollHeight, 130) + "px";
  });

  userInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  const welcomeHTML = document.getElementById("welcomeScreen").outerHTML;

  function clearChat() {
    messages = [];
    chatArea.innerHTML = welcomeHTML;
    rebindChips();
  }

  function rebindChips() {
    document.querySelectorAll(".chip").forEach(chip => {
      chip.onclick = () => sendSuggestion(chip.getAttribute("onclick").match(/'(.+)'/)?.[1] || "");
    });
  }

  function sendSuggestion(text) {
    userInput.value = text;
    sendMessage();
  }

  function removeWelcome() {
    const w = document.getElementById("welcomeScreen");
    if (w) w.remove();
  }

  function addMessage(role, content) {
    removeWelcome();
    const wrap = document.createElement("div");
    wrap.className = `message ${role}`;

    const av = document.createElement("div");
    av.className = `av ${role}`;
    av.textContent = role === "ai" ? "⚡" : "👤";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = role === "ai" ? formatText(content) : escapeHtml(content);

    wrap.appendChild(av);
    wrap.appendChild(bubble);
    chatArea.appendChild(wrap);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function addTyping() {
    removeWelcome();
    const wrap = document.createElement("div");
    wrap.className = "message ai";
    wrap.id = "typingEl";

    const av = document.createElement("div");
    av.className = "av ai";
    av.textContent = "⚡";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;

    wrap.appendChild(av);
    wrap.appendChild(bubble);
    chatArea.appendChild(wrap);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("typingEl");
    if (el) el.remove();
  }

  function escapeHtml(text) {
    return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function formatText(text) {
    return escapeHtml(text)
      .replace(/```([\s\S]*?)```/g, "<pre><code>$1</code></pre>")
      .replace(/`([^`\n]+)`/g, "<code>$1</code>")
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      .replace(/\*(.+?)\*/g, "<em>$1</em>")
      .replace(/^#{1,3} (.+)$/gm, "<strong>$1</strong>")
      .replace(/^[-•] (.+)$/gm, "• $1")
      .replace(/\n/g, "<br>");
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || sendBtn.disabled) return;

    userInput.value = "";
    userInput.style.height = "auto";
    sendBtn.disabled = true;

    addMessage("user", text);
    messages.push({ role: "user", content: text });
    addTyping();

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages })
      });

      const data = await res.json();
      removeTyping();

      if (!res.ok || data.error) {
        addMessage("ai", "⚠️ Error: " + (data.error || "Terjadi kesalahan, coba lagi."));
      } else {
        addMessage("ai", data.reply);
        messages.push({ role: "assistant", content: data.reply });
      }
    } catch (err) {
      removeTyping();
      addMessage("ai", "⚠️ Tidak bisa konek ke server. Pastikan server sudah berjalan dan API key sudah diset.");
    }

    sendBtn.disabled = false;
    userInput.focus();
  }
</script>
</body>
</html>
