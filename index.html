<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #060608;
      --surface: #0e0e12;
      --surface2: #16161c;
      --border: rgba(255,255,255,0.07);
      --accent: #7fff6e;
      --accent2: #00e5ff;
      --text: #f0f0f0;
      --muted: #666672;
      --user-bubble: #1a1a22;
      --ai-bubble: #111116;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    /* GRID BG */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(127,255,110,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(127,255,110,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(127,255,110,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* HEADER */
    .header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: rgba(6,6,8,0.9);
      backdrop-filter: blur(20px);
      flex-shrink: 0;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .brand-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: -0.5px;
    }
    .brand-name span { color: var(--accent); }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(127,255,110,0.08);
      border: 1px solid rgba(127,255,110,0.2);
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 0.72rem;
      color: var(--accent);
    }
    .status-dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    .clear-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .clear-btn:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }

    /* CHAT AREA */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      position: relative;
      z-index: 1;
      scroll-behavior: smooth;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }

    /* WELCOME */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      flex: 1;
      text-align: center;
      padding: 2rem;
      animation: fadeIn 0.5s ease;
    }
    .welcome-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, rgba(127,255,110,0.15), rgba(0,229,255,0.1));
      border: 1px solid rgba(127,255,110,0.2);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    .welcome h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -1px;
    }
    .welcome h2 span { color: var(--accent); }
    .welcome p {
      color: var(--muted);
      font-size: 0.88rem;
      max-width: 320px;
      line-height: 1.6;
    }
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 480px;
      margin-top: 0.5rem;
    }
    .suggestion-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 8px 14px;
      border-radius: 99px;
      font-size: 0.78rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .suggestion-chip:hover {
      border-color: rgba(127,255,110,0.3);
      color: var(--accent);
      background: rgba(127,255,110,0.05);
    }

    /* MESSAGES */
    .message {
      display: flex;
      gap: 10px;
      animation: fadeIn 0.3s ease;
      max-width: 820px;
      width: 100%;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; margin-left: auto; }
    .message.ai { margin-right: auto; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .avatar.ai {
      background: linear-gradient(135deg, rgba(127,255,110,0.2), rgba(0,229,255,0.1));
      border: 1px solid rgba(127,255,110,0.2);
    }
    .avatar.user {
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 0.88rem;
      line-height: 1.65;
      max-width: calc(100% - 44px);
      word-break: break-word;
    }
    .message.user .bubble {
      background: var(--user-bubble);
      border: 1px solid rgba(255,255,255,0.08);
      border-bottom-right-radius: 4px;
      color: var(--text);
    }
    .message.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: #e0e0e0;
    }

    /* TYPING */
    .typing-dots {
      display: flex;
      gap: 4px;
      padding: 4px 2px;
    }
    .typing-dots span {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: typing 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%,60%,100% { opacity: 0.2; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-4px); }
    }

    /* INPUT AREA */
    .input-area {
      position: relative;
      z-index: 10;
      padding: 1rem 1.5rem 1.2rem;
      border-top: 1px solid var(--border);
      background: rgba(6,6,8,0.95);
      backdrop-filter: blur(20px);
      flex-shrink: 0;
    }
    .input-box {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px 10px 10px 16px;
      transition: border-color 0.2s;
    }
    .input-box:focus-within {
      border-color: rgba(127,255,110,0.3);
    }
    textarea {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      resize: none;
      outline: none;
      max-height: 140px;
      min-height: 22px;
      line-height: 1.5;
    }
    textarea::placeholder { color: var(--muted); }

    .send-btn {
      width: 36px; height: 36px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
      width: auto;
      padding: 0 14px;
      gap: 6px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.82rem;
      color: #060608;
    }
    .send-btn:hover { background: #9bff8e; transform: translateY(-1px); }
    .send-btn:active { transform: translateY(0); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .input-hint {
      text-align: center;
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 8px;
    }

    /* CODE BLOCK */
    .bubble pre {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(127,255,110,0.15);
      border-radius: 8px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 8px 0;
      font-size: 0.82rem;
      font-family: 'Courier New', monospace;
    }
    .bubble code { font-family: 'Courier New', monospace; font-size: 0.85em; color: var(--accent); }
    .bubble strong { color: #fff; }
    .bubble ul, .bubble ol { padding-left: 1.2rem; }
    .bubble li { margin: 3px 0; }

    @media (max-width: 500px) {
      .header { padding: 0.8rem 1rem; }
      .chat-area { padding: 1rem; }
      .input-area { padding: 0.8rem 1rem 1rem; }
      .welcome h2 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <div class="brand-icon">🤖</div>
    <div class="brand-name">AI<span>Chat</span></div>
  </div>
  <div class="status-pill">
    <div class="status-dot"></div>
    Online
  </div>
  <button class="clear-btn" onclick="clearChat()">Hapus Chat</button>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcomeScreen">
    <div class="welcome-icon">✦</div>
    <h2>Halo! Saya <span>AI</span> kamu</h2>
    <p>Tanyakan apa saja — sains, coding, bahasa, ide kreatif, atau sekadar ngobrol.</p>
    <div class="suggestions">
      <div class="suggestion-chip" onclick="sendSuggestion('Buatkan saya contoh kode Python sederhana')">💻 Contoh kode Python</div>
      <div class="suggestion-chip" onclick="sendSuggestion('Jelaskan cara kerja AI dengan bahasa sederhana')">🧠 Cara kerja AI</div>
      <div class="suggestion-chip" onclick="sendSuggestion('Bantu saya menulis caption Instagram yang menarik')">✍️ Caption Instagram</div>
      <div class="suggestion-chip" onclick="sendSuggestion('Apa resep makanan yang mudah dibuat?')">🍳 Resep makanan</div>
      <div class="suggestion-chip" onclick="sendSuggestion('Rekomendasikan anime bagus untuk ditonton')">🎌 Rekomendasi anime</div>
      <div class="suggestion-chip" onclick="sendSuggestion('Terjemahkan: Hello, how are you?')">🌐 Terjemahan</div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-box">
    <textarea id="userInput" placeholder="Ketik pesan..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      Kirim
    </button>
  </div>
  <div class="input-hint">Enter untuk kirim · Shift+Enter untuk baris baru</div>
</div>

<script>
  let messages = [];
  const chatArea = document.getElementById("chatArea");
  const userInput = document.getElementById("userInput");
  const sendBtn = document.getElementById("sendBtn");

  // Auto resize textarea
  userInput.addEventListener("input", () => {
    userInput.style.height = "auto";
    userInput.style.height = Math.min(userInput.scrollHeight, 140) + "px";
  });

  userInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function clearChat() {
    messages = [];
    chatArea.innerHTML = "";
    chatArea.innerHTML = `<div class="welcome" id="welcomeScreen">
      <div class="welcome-icon">✦</div>
      <h2>Halo! Saya <span>AI</span> kamu</h2>
      <p>Tanyakan apa saja — sains, coding, bahasa, ide kreatif, atau sekadar ngobrol.</p>
      <div class="suggestions">
        <div class="suggestion-chip" onclick="sendSuggestion('Buatkan saya contoh kode Python sederhana')">💻 Contoh kode Python</div>
        <div class="suggestion-chip" onclick="sendSuggestion('Jelaskan cara kerja AI dengan bahasa sederhana')">🧠 Cara kerja AI</div>
        <div class="suggestion-chip" onclick="sendSuggestion('Bantu saya menulis caption Instagram yang menarik')">✍️ Caption Instagram</div>
        <div class="suggestion-chip" onclick="sendSuggestion('Apa resep makanan yang mudah dibuat?')">🍳 Resep makanan</div>
        <div class="suggestion-chip" onclick="sendSuggestion('Rekomendasikan anime bagus untuk ditonton')">🎌 Rekomendasi anime</div>
        <div class="suggestion-chip" onclick="sendSuggestion('Terjemahkan: Hello, how are you?')">🌐 Terjemahan</div>
      </div>
    </div>`;
  }

  function sendSuggestion(text) {
    userInput.value = text;
    sendMessage();
  }

  function addMessage(role, content) {
    const welcome = document.getElementById("welcomeScreen");
    if (welcome) welcome.remove();

    const wrap = document.createElement("div");
    wrap.className = `message ${role}`;

    const avatar = document.createElement("div");
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === "ai" ? "✦" : "👤";

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    if (role === "ai") {
      bubble.innerHTML = formatText(content);
    } else {
      bubble.textContent = content;
    }

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chatArea.appendChild(wrap);
    chatArea.scrollTop = chatArea.scrollHeight;
    return bubble;
  }

  function addTyping() {
    const welcome = document.getElementById("welcomeScreen");
    if (welcome) welcome.remove();

    const wrap = document.createElement("div");
    wrap.className = "message ai";
    wrap.id = "typingIndicator";

    const avatar = document.createElement("div");
    avatar.className = "avatar ai";
    avatar.textContent = "✦";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chatArea.appendChild(wrap);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("typingIndicator");
    if (el) el.remove();
  }

  function formatText(text) {
    return text
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/```([\s\S]*?)```/g, "<pre><code>$1</code></pre>")
      .replace(/`([^`]+)`/g, "<code>$1</code>")
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      .replace(/\*(.+?)\*/g, "<em>$1</em>")
      .replace(/^### (.+)$/gm, "<strong>$1</strong>")
      .replace(/^## (.+)$/gm, "<strong>$1</strong>")
      .replace(/^# (.+)$/gm, "<strong>$1</strong>")
      .replace(/^- (.+)$/gm, "• $1")
      .replace(/\n/g, "<br>");
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || sendBtn.disabled) return;

    userInput.value = "";
    userInput.style.height = "auto";
    sendBtn.disabled = true;

    addMessage("user", text);
    messages.push({ role: "user", content: text });

    addTyping();

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages })
      });

      const data = await res.json();
      removeTyping();

      if (!res.ok || data.error) {
        addMessage("ai", "⚠️ Terjadi kesalahan: " + (data.error || "Coba lagi."));
      } else {
        addMessage("ai", data.reply);
        messages.push({ role: "assistant", content: data.reply });
      }
    } catch (err) {
      removeTyping();
      addMessage("ai", "⚠️ Tidak bisa terhubung ke server. Pastikan API sudah dikonfigurasi.");
    }

    sendBtn.disabled = false;
    userInput.focus();
  }
</script>
</body>
</html>
